<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon - Webathon</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  
  <!-- Custom Shadcn UI CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            border: "hsl(var(--border))",
            input: "hsl(var(--input))",
            ring: "hsl(var(--ring))",
            background: "hsl(var(--background))",
            foreground: "hsl(var(--foreground))",
            primary: {
              DEFAULT: "hsl(var(--primary))",
              foreground: "hsl(var(--primary-foreground))",
            },
            secondary: {
              DEFAULT: "hsl(var(--secondary))",
              foreground: "hsl(var(--secondary-foreground))",
            },
            destructive: {
              DEFAULT: "hsl(var(--destructive))",
              foreground: "hsl(var(--destructive-foreground))",
            },
            muted: {
              DEFAULT: "hsl(var(--muted))",
              foreground: "hsl(var(--muted-foreground))",
            },
            accent: {
              DEFAULT: "hsl(var(--accent))",
              foreground: "hsl(var(--accent-foreground))",
            },
            popover: {
              DEFAULT: "hsl(var(--popover))",
              foreground: "hsl(var(--popover-foreground))",
            },
            card: {
              DEFAULT: "hsl(var(--card))",
              foreground: "hsl(var(--card-foreground))",
            },
          },
          borderRadius: {
            lg: "var(--radius)",
            md: "calc(var(--radius) - 2px)",
            sm: "calc(var(--radius) - 4px)",
          },
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Import Maps for ES Modules (Three.js) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body class="selection:bg-primary selection:text-primary-foreground min-h-screen flex flex-col antialiased bg-background overflow-hidden">
  
  <!-- Background Canvas -->
  <div id="canvas-container" class="fixed inset-0 opacity-40"></div>

  <!-- Navbar -->
  <header id="navbar" class="fixed top-0 left-0 right-0 z-50 py-4 bg-transparent">
    <div class="container mx-auto px-4 md:px-6 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 group">
        <div class="bg-primary text-primary-foreground p-1.5 rounded-lg group-hover:bg-indigo-600 transition-colors">
          <i data-lucide="code-2" class="w-6 h-6"></i>
        </div>
        <span class="font-bold text-xl tracking-tight">Webathon</span>
      </a>
      <a href="index.html" class="shad-btn shad-btn-outline h-10 px-6 rounded-full text-sm bg-background/50 backdrop-blur-sm">Back to Home</a>
    </div>
  </header>

  <main class="relative z-10 flex-1 flex flex-col items-center justify-center text-center px-4">
    <div class="max-w-2xl space-y-8 animate-in fade-in zoom-in duration-700">
      <div class="inline-block px-4 py-1.5 border border-primary/20 rounded-full bg-primary/5 backdrop-blur-sm">
        <span class="text-sm font-medium text-primary">Challenge Tracks</span>
      </div>
      
      <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight">
        Opening <br />
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500">
          Very Soon
        </span>
      </h1>
      
      <p class="text-lg md:text-xl text-muted-foreground">
        We're currently finalizing the official problem statements to ensure they're as exciting and challenging as possible. Stay tuned!
      </p>

      <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-4">
        <a href="index.html" class="shad-btn shad-btn-primary h-12 px-8 rounded-full w-full sm:w-auto">Return Home</a>
      </div>
    </div>
  </main>

  <!-- Lucide Replacement -->
  <script>
    lucide.createIcons();
  </script>

  <!-- Three.js Background -->
  <script type="module" src="js/three-bg.js"></script>
</body>
</html>
